_format_version: "3.0"
_transform: true

#############################
# SERVICES
#############################

services:

  - name: node-api-service
    url: http://api-node:3000
    routes:

      # ============================
      # CANAL WEB  — rate 60/min
      # ============================
      - name: web-api-route
        paths:
          - /api/v1/web
        strip_path: true
        methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config:
              minute: 60
              policy: local
              limit_by: header
              header_name: Authorization
              hide_client_headers: true
          - name: request-transformer
            config:
              add:
                headers:
                  - X-Channel:web

      # ============================
      # CANAL MOBILE — rate 30/min
      # ============================
      - name: mobile-api-route
        paths:
          - /api/v1/mobile
        strip_path: true
        methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
              limit_by: header
              header_name: Authorization
              hide_client_headers: true
          - name: request-transformer
            config:
              add:
                headers:
                  - X-Channel:mobile

#############################
# PLUGINS GLOBALES
#############################

plugins:

  # ============================
  # CORS — ambos canales
  # ============================
  - name: cors
    config:
      origins:
        - http://localhost:8100
        - http://localhost:4200
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers:
        - Authorization
        - Content-Type
        - X-App-Fingerprint
        - X-Client-Public-Key
      exposed_headers:
        - X-Request-Id
      credentials: false
      max_age: 3600

  # ============================
  # CORRELATION ID
  # ============================
  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid
      echo_downstream: true

  # ============================
  # SECURITY HEADERS
  # ============================
  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Referrer-Policy:no-referrer
          - Permissions-Policy:geolocation=()

#############################
# FIN
#############################
