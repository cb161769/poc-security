_format_version: "3.0"
_transform: true

#############################
# SERVICES
#############################

services:

  # ── IDENTITY BRIDGE (api-node) ─────────────────────
  - name: node-api-service
    url: http://api-node:3000
    routes:
      - name: web-data-route
        paths: [/api/v1/web]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 60, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: true }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:web"] } }

      - name: mobile-data-route
        paths: [/api/v1/mobile]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 30, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: true }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:mobile"] } }

  # ── TRANSFERS SERVICE ──────────────────────────────
  - name: transfers-svc
    url: http://transfers-service:3001
    routes:
      - name: web-transfers-route
        paths: [/api/v1/web/transfers]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 60, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: true }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:web"] } }

      - name: mobile-transfers-route
        paths: [/api/v1/mobile/transfers]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 30, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: true }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:mobile"] } }

  # ── PAYMENTS SERVICE ───────────────────────────────
  - name: payments-svc
    url: http://payments-service:3002
    routes:
      - name: web-payments-route
        paths: [/api/v1/web/payments]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 60, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: true }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:web"] } }

      - name: mobile-payments-route
        paths: [/api/v1/mobile/payments]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 30, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: true }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:mobile"] } }

#############################
# PLUGINS GLOBALES
#############################

plugins:

  - name: cors
    config:
      origins: [http://localhost:8100, http://localhost:4200]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: [Authorization, Content-Type, X-App-Fingerprint, X-Client-Public-Key, X-Idempotency-Key]
      exposed_headers: [X-Request-Id]
      credentials: false
      max_age: 3600

  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid
      echo_downstream: true

  - name: response-transformer
    config:
      add:
        headers:
          - X-Content-Type-Options:nosniff
          - X-Frame-Options:DENY
          - Referrer-Policy:no-referrer
          - Permissions-Policy:geolocation=()
