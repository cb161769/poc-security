_format_version: "3.0"
_transform: true

#############################
# SERVICES
#############################

services:

  # ── IDENTITY BRIDGE (api-node) ─────────────────────
  - name: node-api-service
    url: http://api-node:3000
    routes:
      - name: web-data-route
        paths: [/api/v1/web]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 60, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: false }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:web"] } }
          - name: pre-function
            config:
              access:
                - |
                  if kong.request.get_method() == "OPTIONS" then return end
                  local ver = kong.request.get_header("x-app-version")
                  local allowed = { ["1.0.0"] = true }
                  if not allowed[ver] then
                    return kong.response.exit(426, {
                      error = "Version not supported. Please update the application.",
                      min_version = "1.0.0"
                    })
                  end

      - name: mobile-data-route
        paths: [/api/v1/mobile]
        strip_path: true
        methods: ["GET", "POST", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 30, policy: local, limit_by: header, header_name: Authorization, hide_client_headers: false }
          - name: request-transformer
            config: { add: { headers: ["X-Channel:mobile"] } }
          - name: pre-function
            config:
              access:
                - |
                  if kong.request.get_method() == "OPTIONS" then return end
                  local ver = kong.request.get_header("x-app-version")
                  local allowed = { ["1.0.0"] = true }
                  if not allowed[ver] then
                    return kong.response.exit(426, {
                      error = "Version not supported. Please update the application.",
                      min_version = "1.0.0"
                    })
                  end

      - name: pubkey-route
        paths: [/api/v1/pubkey]
        strip_path: false
        methods: ["GET", "OPTIONS"]
        plugins:
          - name: rate-limiting
            config: { minute: 120, policy: local }

