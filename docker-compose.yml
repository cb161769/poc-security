services:
  # --- CAPA DE DATOS (Aislada) ---
  db-poc:
    image: postgres:15-alpine
    container_name: db-poc
    environment:
      POSTGRES_USER: admin_seguro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_2026}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - secure-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin_seguro", "-d", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- ODOO ERP (Core Business) ---
  odoo:
    image: odoo:17
    container_name: odoo-server
    command: odoo --db-filter=pocdb
    depends_on:
      db-poc:
        condition: service_healthy
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo-custom-addons:/mnt/extra-addons
    environment:
      - HOST=db-poc
      - USER=admin_seguro
      - PASSWORD=${POSTGRES_PASSWORD:-password_2026}
      - INTERNAL_SECRET=${INTERNAL_SECRET:-mi_clave_secreta_2026}
    networks:
      - secure-net

  # --- KEYCLOAK 26 (Identidad Federada) ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak-server
    command: start --http-enabled=true --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-poc:5432/postgres
      KC_DB_USERNAME: admin_seguro
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-password_2026}
      KC_DB_SCHEMA: keycloak
      KC_DB_POOL_MIN_SIZE: "5"
      KC_DB_POOL_MAX_SIZE: "20"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_CACHE: local
      KC_HTTP_PORT: "8080"
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import/
    networks:
      - secure-net
    ports:
      - "8080:8080"
    depends_on:
      db-poc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  # --- KONG GATEWAY (Perímetro de Seguridad) ---
  kong:
    image: kong:3.5
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml

      KONG_PLUGINS: bundled

      # LISTENERS
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 127.0.0.1:8001

      # TLS servidor
      KONG_SSL_CERT: /shared-keys/fullchain.pem
      KONG_SSL_CERT_KEY: /shared-keys/kong.key

      # mTLS
      KONG_SSL_CLIENT_CERT: /shared-keys/ca.pem
      KONG_SSL_VERIFY_CLIENT: on
      KONG_SSL_VERIFY_DEPTH: 1

      # LOGS
      KONG_LOG_LEVEL: notice
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # HARDENING TLS
      KONG_SSL_PROTOCOLS: TLSv1.2 TLSv1.3
      KONG_SSL_CIPHERS: TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
      KONG_NGINX_HTTP_SSL_SESSION_TICKETS: "off"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
      - ./shared-keys:/shared-keys:ro
      - ./certs:/etc/letsencrypt
    ports:
      - "8000:8000"
      - "8443:8443"           # Puerto para SSL Pinning
      - "127.0.0.1:8001:8001" # Admin API Protegida
    networks:
      - public-net
      - secure-net

  # --- CERTBOT (Renovación Automática de SSL) ---
  certbot:
    image: certbot/certbot
    container_name: certbot-service
    volumes:
      - ./certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - public-net

  # --- KEY-ROTATOR (Rotación de llaves RSA 24h) ---
  key-rotator:
    image: alpine:latest
    container_name: key-rotator
    volumes:
      - ./shared-keys:/shared-keys
    entrypoint: >
      /bin/sh -c "while true; do
        echo '🔄 Rotando llaves...';
        apk add --no-cache openssl;
        openssl genrsa -out /shared-keys/priv.pem 2048;
        chmod 644 /shared-keys/priv.pem;
        openssl rsa -in /shared-keys/priv.pem -pubout -out /shared-keys/pub.pem;
        date > /shared-keys/last_rotation.txt;
        sleep 86400;
      done"

  # --- TRANSFERS SERVICE ---
  transfers-service:
    build: ./transfers-service
    container_name: transfers-service
    environment:
      - MOBILE_REALM_ISSUER=http://localhost:8080/realms/mobile-realm
      - MOBILE_REALM_JWKS=http://keycloak:8080/realms/mobile-realm/protocol/openid-connect/certs
      - WEB_REALM_ISSUER=http://localhost:8080/realms/web-realm
      - WEB_REALM_JWKS=http://keycloak:8080/realms/web-realm/protocol/openid-connect/certs
      - ODOO_URL=http://odoo-server:8069
      - INTERNAL_SECRET=${INTERNAL_SECRET:-mi_clave_secreta_2026}
      - REDIS_URL=redis://redis-cache:6379
      - MIN_APP_VERSION=${MIN_APP_VERSION:-1.0.0}
      - NODE_ENV=production
    volumes:
      - ./shared-keys:/shared-keys:ro
    networks:
      - secure-net
    depends_on:
      keycloak:
        condition: service_healthy
      odoo:
        condition: service_started
      redis-cache:
        condition: service_healthy

  # --- PAYMENTS SERVICE ---
  payments-service:
    build: ./payments-service
    container_name: payments-service
    environment:
      - MOBILE_REALM_ISSUER=http://localhost:8080/realms/mobile-realm
      - MOBILE_REALM_JWKS=http://keycloak:8080/realms/mobile-realm/protocol/openid-connect/certs
      - WEB_REALM_ISSUER=http://localhost:8080/realms/web-realm
      - WEB_REALM_JWKS=http://keycloak:8080/realms/web-realm/protocol/openid-connect/certs
      - ODOO_URL=http://odoo-server:8069
      - INTERNAL_SECRET=${INTERNAL_SECRET:-mi_clave_secreta_2026}
      - REDIS_URL=redis://redis-cache:6379
      - MIN_APP_VERSION=${MIN_APP_VERSION:-1.0.0}
      - NODE_ENV=production
    volumes:
      - ./shared-keys:/shared-keys:ro
    networks:
      - secure-net
    depends_on:
      keycloak:
        condition: service_healthy
      odoo:
        condition: service_started
      redis-cache:
        condition: service_healthy

  # --- API NODE.JS (Identity Bridge) ---
  api-node:
    build: ./api-node
    container_name: api-node
    environment:
      - ODOO_URL=http://odoo-server:8069
      - INTERNAL_SECRET=${INTERNAL_SECRET:-mi_clave_secreta_2026}
      - KEYCLOAK_BASE=http://keycloak:8080
      - MOBILE_REALM_ISSUER=http://localhost:8080/realms/mobile-realm
      - MOBILE_REALM_JWKS=http://keycloak:8080/realms/mobile-realm/protocol/openid-connect/certs
      - WEB_REALM_ISSUER=http://localhost:8080/realms/web-realm
      - WEB_REALM_JWKS=http://keycloak:8080/realms/web-realm/protocol/openid-connect/certs
      - JWT_AUDIENCE=mobile-api
      - TZ=America/New_York
      - REDIS_URL=redis://redis-cache:6379
      - MIN_APP_VERSION=${MIN_APP_VERSION:-1.0.0}
      - NODE_ENV=production
    volumes:
      - ./shared-keys:/shared-keys:ro
    networks:
      - secure-net
    depends_on:
      keycloak:
        condition: service_healthy
      kong:
        condition: service_started
      redis-cache:
        condition: service_healthy

  # --- ANDROID EMULATOR (Android 34, software renderer) ---
  # Requires: docker compose --profile android-tests up
  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    container_name: android-emulator
    privileged: true           # KVM passthrough on Linux hosts; falls back to swiftshader on Windows/WSL2
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "false"
      DATAPARTITION: "2048m"
    ports:
      - "5555:5555"            # ADB TCP
    networks:
      - secure-net
    profiles:
      - android-tests
    healthcheck:
      test: ["CMD-SHELL", "adb -e shell getprop sys.boot_completed 2>/dev/null | grep -q '1'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s

  # --- ANDROID BUILD (compiles release APK from source) ---
  # Runs once and exits; output written to android-apk volume
  android-build:
    build:
      context: ./docker/android-build
    container_name: android-build
    volumes:
      - ./ionic-app/poc-security:/workspace:ro
      - android-apk:/output
      - ./docs/android-build-reports:/build/android/build/reports
    networks:
      - secure-net
    profiles:
      - android-tests
    restart: "no"

  # --- ANDROID TEST RUNNER (runs security test suite) ---
  # Waits for emulator healthy + build complete, then runs test-android-docker.ps1
  android-test-runner:
    build:
      context: ./docker/android-test-runner
    container_name: android-test-runner
    environment:
      EMULATOR_HOST: android-emulator
      EMULATOR_PORT: "5555"
      MAX_WAIT_SECONDS: "300"
    volumes:
      - android-apk:/apk-input:ro
      - ./docs/android-test-reports:/reports
    networks:
      - secure-net
    profiles:
      - android-tests
    restart: "no"
    depends_on:
      android-emulator:
        condition: service_healthy
      android-build:
        condition: service_completed_successfully

  # --- REDIS (token blacklist · idempotency · pubkey binding · circuit breaker state) ---
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - secure-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  public-net:
    driver: bridge
  secure-net:
    internal: false # Cambiar a true en producción total para aislar el backend del mundo

volumes:
  postgres_data:
  odoo_data:
  android-apk:               # shared APK between android-build and android-test-runner